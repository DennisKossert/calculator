<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="index.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="calc-body">
            <div class="screen">
                <div class="screen-text">
                    Hello!
                </div>
            </div>
            <div class="button-container">
                <div class="numpad">
                    <div class="numrow">
                        <button class="clear operator">C</button>
                    </div>
                    <div class="numrow">
                        <button class="one digit">1</button>
                        <button class="two digit">2</button>
                        <button class="three digit">3</button>
                    </div>
                    <div class="numrow">
                        <button class="four digit">4</button>
                        <button class="five digit">5</button>
                        <button class="six digit">6</button>
                    </div>
                    <div class="numrow">
                        <button class="seven digit">7</button>
                        <button class="eight digit">8</button>
                        <button class="nine digit">9</button>
                    </div>
                    <div class="numrow">
                        <button class="dot digit">.</button>
                        <button class="zero digit">0</button>
                        <button class="back operator">CE</button>
                    </div>
                </div>
                <div class="operator-container">
                    <button class="equal operator">=</button>
                    <button class="plus operator">+</button>
                    <button class="minus operator">-</button>
                    <button class="asterisk operator">*</button>
                    <button class="solidus operator">/</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
